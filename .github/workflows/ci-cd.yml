name: CI-CD Deploy API

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/health-api:latest

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build_and_push
    timeout-minutes: 20
    environment:
      name: production
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Prepare SSH key
        env:
          VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add VPS host key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy API container via SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/health-api
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          API_BIND_PORT: ${{ secrets.API_BIND_PORT }}
        run: |
          ssh -p "${VPS_PORT:-22}" "${VPS_USER}@${VPS_HOST}" \
            "set -euo pipefail; \
            if [ -n '${DOCKERHUB_USERNAME}' ] && [ -n '${DOCKERHUB_TOKEN}' ]; then \
              echo '${DOCKERHUB_TOKEN}' | sudo docker login --username '${DOCKERHUB_USERNAME}' --password-stdin; \
            fi; \
            sudo docker pull '${DOCKER_IMAGE}:latest'; \
            sudo docker rm -f health-api >/dev/null 2>&1 || true; \
            sudo docker run -d --name health-api --restart unless-stopped \
              -p 127.0.0.1:${API_BIND_PORT:-8080}:8080 \
              '${DOCKER_IMAGE}:latest'"
